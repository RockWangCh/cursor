user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss;

    # 上游服务器组
    upstream crp_backend {
        least_conn;
        
        server crp-router-1:8080 weight=1 max_fails=3 fail_timeout=30s;
        server crp-router-2:8080 weight=1 max_fails=3 fail_timeout=30s;
        server crp-router-3:8080 weight=1 max_fails=3 fail_timeout=30s;
        server crp-router-4:8080 weight=1 max_fails=3 fail_timeout=30s;
        
        keepalive 32;
    }

    # 限流配置
    limit_req_zone $binary_remote_addr zone=route_limit:10m rate=100r/s;
    limit_req_status 429;

    # 主服务器配置
    server {
        listen 80;
        server_name _;

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # 路径规划API
        location /route {
            limit_req zone=route_limit burst=50 nodelay;
            
            proxy_pass http://crp_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # 超时设置
            proxy_connect_timeout 50ms;
            proxy_send_timeout 100ms;
            proxy_read_timeout 100ms;
            
            # 请求头
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 缓冲设置
            proxy_buffering off;
            proxy_request_buffering off;
            
            # 错误处理
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 100ms;
        }

        # 健康检查
        location /health {
            access_log off;
            proxy_pass http://crp_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # 监控指标
        location /metrics {
            access_log off;
            proxy_pass http://crp_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Nginx状态
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.20.0.0/16;
            deny all;
        }

        # 默认响应
        location / {
            return 404 '{"error": "Not Found"}';
            add_header Content-Type application/json;
        }
    }

    # HTTPS配置（可选）
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        
        # SSL优化
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        
        # 复用HTTP配置
        include /etc/nginx/conf.d/locations.conf;
    }
}